name: Claude PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude reviews this PR
    runs-on: ubuntu-latest
    # Skip the auto-review on draft PRs to save tokens
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude code review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prompt: |
            You are reviewing a pull request for AgentGov for Copilot Studio — a TypeScript MCP governance layer for Microsoft Copilot Studio multi-agent systems.

            Project context:
            - Two governance gates: Trust Gate (verify external A2A agents before delegation) and Release Gate (verify own agents before production release)
            - Local-first CLI + MCP Streamable HTTP server
            - HMAC-signed decisions, YAML policy engine, OpenTelemetry GenAI semconv spans
            - SQLite default storage with Dataverse + SharePoint adapters
            - See README.md and docs/threat-model.md for full context

            Ownership rules (DO NOT flag as violations):
            - Codex owns: src/**, schemas/**, fixtures/**, policies/**/*.test.ts, package.json, package-lock.json, tsconfig.json, .gitignore
            - Claude owns: README.md, LICENSE, CONTRIBUTING.md, CODE_OF_CONDUCT.md, SECURITY.md, docs/**, infra/**, azure.yaml, .github/**, policies/vendor-exception.yaml, target-agents/vendor-exception.yaml

            Review the diff for:
            1. Bugs, logic errors, type-safety gaps
            2. Security issues — especially around HMAC signing, JCS canonicalization, policy evaluation, signature verification, redaction
            3. Drift between code and docs (engine behavior must match README/docs claims)
            4. Drift between policy YAML rules and Codex's PolicyDocument / RuleOp schema in src/gate/ruleEngine.ts
            5. Test coverage gaps on critical paths (signing, verification, regression-over-time, idempotency, revocation)
            6. Production hygiene: error handling, input validation at boundaries, no secrets in logs, no PII in audit records
            7. Cost-effectiveness: no paid LLM calls in the core decision path

            Output format:
            - Lead with verdict: APPROVE / REQUEST_CHANGES / COMMENT
            - High-priority issues first (security, correctness)
            - Medium next (clarity, maintainability)
            - Low last (nits)
            - Cite file:line for every finding
            - Be brief. No filler. Senior-eng tone.

            If the PR is from Codex's branch (codex/core-engine), focus heavily on engine correctness.
            If from Claude's branch (claude/docs-wiring), focus heavily on doc/code alignment.
          claude_args: |
            --model claude-opus-4-7
