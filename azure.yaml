name: agentgov
metadata:
  template: agentgov@0.1.0

services:
  api:
    project: .
    language: ts
    host: containerapp
    docker:
      remoteBuild: true

hooks:
  predeploy:
    shell: sh
    run: |
      # The repo ships a Dockerfile at the root; azd builds it remotely thanks
      # to docker.remoteBuild above and sets SERVICE_API_IMAGE_NAME, which
      # infra/main.parameters.json substitutes into the containerImage Bicep
      # param. Operators with a pre-built image override via
      # `azd env set SERVICE_API_IMAGE_NAME <ref>` before `azd up`.
      if [ ! -f Dockerfile ]; then
        echo "::error::Cannot deploy: Dockerfile is missing from the repo root."
        echo "azd up needs the Dockerfile to remote-build the image."
        exit 1
      fi
      echo "AgentGov predeploy: Dockerfile present, azd will build, push, and set SERVICE_API_IMAGE_NAME."
