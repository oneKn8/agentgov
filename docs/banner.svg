<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentGov for Copilot Studio banner</title>
  <desc id="desc">A governance banner showing inbound trust verification and outbound release approval for multi-agent Copilot Studio systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101418"/>
      <stop offset="0.42" stop-color="#14201d"/>
      <stop offset="1" stop-color="#211819"/>
    </linearGradient>
    <linearGradient id="trust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25D0A2"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="release" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB454"/>
      <stop offset="1" stop-color="#FF7A59"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <path d="M0 270 C210 210 315 334 505 272 C690 211 775 115 1001 164 C1100 185 1157 153 1200 126 V360 H0 V270Z" fill="#283029" opacity="0.58"/>
  <path d="M58 68 H1142" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <path d="M58 292 H1142" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <g transform="translate(64 58)">
    <rect x="0" y="0" width="148" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="25" cy="21" r="8" fill="#25D0A2"/>
    <text x="42" y="27" fill="#DDE7E2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Special Ops</text>
  </g>

  <g transform="translate(64 118)">
    <text x="0" y="0" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="850" letter-spacing="0">AgentGov</text>
    <text x="0" y="48" fill="#D8E0DC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Trust and release governance for Copilot Studio multi-agent systems</text>
    <text x="0" y="92" fill="#AEBAB5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Verify external agents before delegation. Verify your own agents before release.</text>
  </g>

  <g transform="translate(678 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="214" height="216" rx="22" fill="#121A1E" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <rect x="18" y="18" width="178" height="40" rx="12" fill="#25D0A2" fill-opacity="0.14" stroke="#25D0A2" stroke-opacity="0.34"/>
    <text x="32" y="44" fill="#A7F3D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">TRUST GATE</text>
    <path d="M44 91 H142" stroke="#DDE7E2" stroke-width="10" stroke-linecap="round" opacity="0.22"/>
    <path d="M44 118 H170" stroke="#DDE7E2" stroke-width="10" stroke-linecap="round" opacity="0.16"/>
    <path d="M44 145 H128" stroke="#DDE7E2" stroke-width="10" stroke-linecap="round" opacity="0.12"/>
    <rect x="40" y="166" width="134" height="30" rx="15" fill="url(#trust)"/>
    <text x="68" y="187" fill="#08211A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="850">ALLOW</text>
  </g>

  <g transform="translate(918 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="214" height="216" rx="22" fill="#1B1716" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <rect x="18" y="18" width="178" height="40" rx="12" fill="#FFB454" fill-opacity="0.14" stroke="#FFB454" stroke-opacity="0.36"/>
    <text x="32" y="44" fill="#FED7AA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">RELEASE GATE</text>
    <path d="M44 91 H162" stroke="#F4E6DC" stroke-width="10" stroke-linecap="round" opacity="0.20"/>
    <path d="M44 118 H136" stroke="#F4E6DC" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
    <path d="M44 145 H174" stroke="#F4E6DC" stroke-width="10" stroke-linecap="round" opacity="0.12"/>
    <rect x="40" y="166" width="134" height="30" rx="15" fill="url(#release)"/>
    <text x="72" y="187" fill="#2A110B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="850">BLOCK</text>
  </g>

  <g opacity="0.85">
    <path d="M553 180 H638" stroke="#93A19B" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M626 166 L642 180 L626 194" stroke="#93A19B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="525" cy="180" r="27" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <path d="M514 180 L522 188 L538 171" stroke="#25D0A2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(64 260)">
    <rect x="0" y="0" width="174" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="20" y="25" fill="#DDE7E2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">MCP + CLI</text>
    <rect x="190" y="0" width="208" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="210" y="25" fill="#DDE7E2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Signed decision records</text>
    <rect x="414" y="0" width="176" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="434" y="25" fill="#DDE7E2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Local-first audit</text>
  </g>
</svg>
